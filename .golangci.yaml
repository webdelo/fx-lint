version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: testdata/
        linters:
          - errcheck
          - govet
          - staticcheck
          - unused
          - ineffassign
formatters:
  enable:
    - gofmt
    - goimports
